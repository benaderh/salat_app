name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Rendre gradlew executable
        run: chmod +x gradlew

      - name: Decoder le keystore depuis les secrets GitHub
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/salat_release.jks
          echo "Keystore decode OK ($(wc -c < app/salat_release.jks) octets)"

      - name: Compiler l'APK (release) avec signature fixe
        env:
          KEYSTORE_PATH: salat_release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload de l'APK genere
        uses: actions/upload-artifact@v4
        with:
          name: salat-times-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
