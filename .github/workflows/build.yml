name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Rendre gradlew executable
        run: chmod +x gradlew

      - name: Verifier que le keystore est present
        run: |
          ls -lh app/salat_release.jks
          echo "Keystore OK"

      - name: Compiler l'APK (release)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload de l'APK genere
        uses: actions/upload-artifact@v4
        with:
          name: salat-times-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
